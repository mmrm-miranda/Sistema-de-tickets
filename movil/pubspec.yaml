name: ticket_reporter
description: Sistema de tickets de soporte técnico
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  go_router: ^13.0.0
  provider: ^6.1.0
  image_picker: ^1.0.7
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.1.0
  supabase_flutter: ^2.3.4
  flutter_local_notifications: ^22.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/cat_working.png
    - assets/images/cat_waiting.png
    - assets/images/cat_no_tickets.png
    - .env
